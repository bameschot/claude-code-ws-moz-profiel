quarkus.datasource.metrics.enabled=true

# OpenAPI Client Generator
quarkus.openapi-generator.codegen.input-base-dir=src/main/resources/openapi
quarkus.wiremock.devservices.port=8089
# Basisprofiel API Client
quarkus.openapi-generator.codegen.spec.api_basisprofiel_yaml.base-package=nl.rijksoverheid.moz.external.clients.basisprofiel
quarkus.openapi-generator.codegen.spec.api_basisprofiel_yaml.config-key=basisprofiel-api
# Client URLs
# Default for local dev; production overrides via env var or deployment config.
quarkus.rest-client.basisprofiel-api.url=${BASISPROFIEL_API_URL:https://api.kvk.nl/api/v1}

# Email Verificatie Client
quarkus.openapi-generator.codegen.spec.verificatie_service_yaml.base-package=nl.rijksoverheid.moz.external.clients.verificatie_service
quarkus.openapi-generator.codegen.spec.verificatie_service_yaml.config-key=verificatie-service
quarkus.rest-client.verificatie-service.url=https://verificatie.example.invalid
%dev.quarkus.rest-client.verificatie-service.url=http://localhost:8089
%test.quarkus.rest-client.verificatie-service.url=http://localhost:8089

# Shared circuit breaker for verificatie-service API
verificatie-service.circuit-breaker.request-volume-threshold=5
verificatie-service.circuit-breaker.failure-ratio=1.0
verificatie-service.circuit-breaker.delay=30
verificatie-service.circuit-breaker.success-threshold=2

# Database
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Envers audit tables are not in V1 yet; disable until a follow-up migration adds them.
quarkus.hibernate-envers.active=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
# Per-environment schema strategy is set in the deployment config
# (config/prod.properties, config/acc.properties), mirroring each other.
# Tests override in src/test/resources/application.properties (Flyway off +
# drop-and-create).

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=16
# Local dev credentials: put real values in a gitignored application-dev.properties
# (do NOT commit them here). Production values come from the deployed secret.
%prod.quarkus.datasource.jdbc.url=
%prod.quarkus.datasource.username=
%prod.quarkus.datasource.password=

#LDV properties
logboekdataverwerking.enabled=false
logboekdataverwerking.service-name=profiel-service
logboekdataverwerking.clickhouse.endpoint=http://localhost:8123
logboekdataverwerking.clickhouse.username=user
logboekdataverwerking.clickhouse.password=password
logboekdataverwerking.clickhouse.database=ldv_logging
logboekdataverwerking.clickhouse.table=logging

# Override for production - values will come from the secret
%prod.logboekdataverwerking.enabled=
%prod.logboekdataverwerking.service-name=
%prod.logboekdataverwerking.clickhouse.endpoint=
%prod.logboekdataverwerking.clickhouse.username=
%prod.logboekdataverwerking.clickhouse.password=
%prod.logboekdataverwerking.clickhouse.database=
%prod.logboekdataverwerking.clickhouse.table=

#NotifyNL properties
notifynl.emailverificatie.api-key=Zie-readme
notifynl.emailverificatie.template-id=Zie-readme
notifynl.emailverificatie.reference=Zie-readme
%prod.notifynl.emailverificatie.api-key=
%prod.notifynl.emailverificatie.template-id=
%prod.notifynl.emailverificatie.reference=

# Tests
quarkus.jacoco.excludes=nl/rijksoverheid/moz/external/**

# Performance test profile
%test.notifynl.emailverificatie.api-key=mock-key
%test.notifynl.emailverificatie.template-id=mock-template
%test.notifynl.emailverificatie.reference=mock-reference

# H2-for-tests config lives in src/test/resources/application.properties

# Retentie scheduler
retentie.scheduler.cron=0 0 2 * * ?
%test.quarkus.scheduler.enabled=false
quarkus.quartz.store-type=jdbc-cmt
quarkus.quartz.clustered=true
%test.quarkus.quartz.store-type=ram
%test.quarkus.quartz.clustered=false

%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false

# OpenAPI publication path (ADR /core/doc-openapi).
quarkus.smallrye-openapi.path=/openapi.json
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/docs
# Keep OpenAPI spec and Swagger UI on the public HTTP port, not the management port.
quarkus.smallrye-openapi.management.enabled=false
quarkus.swagger-ui.management.enabled=false

# Management port (separates /q/health and /q/metrics from the public HTTP port,
# so they can be scraped cluster-internally without being exposed via the gateway).
quarkus.management.enabled=true
quarkus.management.port=9090
quarkus.management.root-path=/q

# CORS (ADR /core/transport/* + NCSC). Explicit origin list, never `*`.
# Override origins per environment via env var or profile-specific properties.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${MOZA_CORS_ORIGINS:https://mijnoverheidzakelijk.nl,https://docs.mijnoverheidzakelijk.nl}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,if-match,x-requested-with
quarkus.http.cors.exposed-headers=API-Version,Location,ETag
quarkus.http.cors.access-control-max-age=86400
# In dev/test, allow localhost so the Swagger UI works.
%dev.quarkus.http.cors.origins=http://localhost:3000,http://localhost:8080
%test.quarkus.http.cors.origins=http://localhost:8080
