quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.devservices.enabled=false

# Tests skip Flyway and let Hibernate build the schema from entities.
# Trade-off: tests don't exercise the actual V*.sql migrations; they exercise
# entity definitions on H2 instead. CI has no Docker, so a real Postgres
# datasource would require a service container in .gitlab-ci.yml.
quarkus.flyway.enabled=false
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

logboekdataverwerking.enabled=false
