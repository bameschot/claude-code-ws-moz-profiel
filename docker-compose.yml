services:
  postgres:
    image: postgres:18
    container_name: quarkus_postgres
    environment:
      POSTGRES_DB: profiel
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d profiel"]
      interval: 10s
      timeout: 5s
      retries: 5
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
    - "8123:8123"
    environment:
      CLICKHOUSE_USER: "user"
      CLICKHOUSE_PASSWORD: "password"
      CLICKHOUSE_DB: "ldv_logging"
volumes:
  postgres_data:
